<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RicoAI — Mercado Completo</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#050508;--bg2:#09090f;--bg3:#0f0f1a;--card:#0c0c18;--border:#1a1a2e;--border2:#252540;--green:#00ff88;--green2:#00c96a;--gold:#ffd166;--red:#ff4757;--blue:#4d79ff;--purple:#a78bfa;--text:#e8e8f0;--muted:#52526e;--muted2:#8888aa;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Instrument Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 70% 40% at 100% 0%,rgba(0,255,136,.05) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 0% 100%,rgba(77,121,255,.04) 0%,transparent 60%);}
header{position:sticky;top:0;z-index:100;background:rgba(5,5,8,.95);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.logo{font-family:"Bricolage Grotesque",sans-serif;font-size:20px;font-weight:800;letter-spacing:-1px;display:flex;align-items:center;gap:8px;white-space:nowrap;color:var(--text);}
.logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--green),#00aa55);display:flex;align-items:center;justify-content:center;font-size:14px;}
.logo span{color:var(--green);}
.search-wrap{flex:1;min-width:200px;max-width:400px;position:relative;}
.search-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:9px 14px 9px 36px;color:var(--text);font-family:"Instrument Sans",sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.search-wrap input:focus{border-color:var(--green);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.2);padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;color:var(--green);white-space:nowrap;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}
.ticker{overflow:hidden;background:var(--bg2);border-bottom:1px solid var(--border);padding:7px 0;position:relative;}
.ticker::before,.ticker::after{content:"";position:absolute;top:0;bottom:0;width:60px;z-index:2;pointer-events:none;}
.ticker::before{left:0;background:linear-gradient(to right,var(--bg2),transparent);}
.ticker::after{right:0;background:linear-gradient(to left,var(--bg2),transparent);}
.ticker-inner{display:flex;animation:tickerMove 50s linear infinite;width:max-content;}
.ti{display:flex;align-items:center;gap:5px;padding:0 18px;font-size:11.5px;white-space:nowrap;}
.ti-s{font-weight:800;font-family:"Bricolage Grotesque",sans-serif;}
.ti-v{color:var(--muted2);}
.ti-c.up{color:var(--green);}
.ti-c.dn{color:var(--red);}
@keyframes tickerMove{from{transform:translateX(0);}to{transform:translateX(-50%);}}
main{padding:20px 24px 40px;max-width:1100px;margin:0 auto;position:relative;z-index:1;}
.pbar{display:flex;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:16px;margin-bottom:18px;overflow:hidden;}
.pbi{flex:1;padding:14px 18px;border-right:1px solid var(--border);}
.pbi:last-child{border-right:none;}
.pbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600;margin-bottom:4px;}
.pbv{font-family:"Bricolage Grotesque",sans-serif;font-size:18px;font-weight:800;}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.tab{background:var(--bg3);border:1px solid var(--border);color:var(--muted2);font-family:"Instrument Sans",sans-serif;font-size:13px;font-weight:500;padding:7px 16px;border-radius:10px;cursor:pointer;transition:all .18s;white-space:nowrap;}
.tab:hover{border-color:var(--border2);color:var(--text);}
.tab.active{background:rgba(0,255,136,.1);border-color:rgba(0,255,136,.3);color:var(--green);}
.tc{font-size:10px;background:rgba(0,255,136,.15);color:var(--green);padding:1px 6px;border-radius:6px;margin-left:4px;font-weight:700;}
.mkt-grid{display:flex;flex-direction:column;gap:7px;}
.arow{display:grid;grid-template-columns:42px 1fr auto 88px 34px;align-items:center;gap:12px;padding:13px 16px;border-radius:13px;background:var(--card);border:1px solid var(--border);cursor:pointer;transition:all .2s;animation:fadeIn .3s ease both;}
.arow:hover{border-color:rgba(0,255,136,.25);transform:translateX(4px);background:#0d0d1c;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.aico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.aname{font-family:"Bricolage Grotesque",sans-serif;font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;}
.afull{font-size:11px;color:var(--muted);margin-top:2px;}
.aprice{font-family:"Bricolage Grotesque",sans-serif;font-size:16px;font-weight:800;text-align:right;}
.achg{font-size:12px;font-weight:700;text-align:right;margin-top:1px;}
.achg.up{color:var(--green);}
.achg.dn{color:var(--red);}
.amini{width:88px;height:34px;}
.afav{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;color:var(--muted);flex-shrink:0;}
.afav:hover,.afav.on{border-color:var(--gold);color:var(--gold);background:rgba(255,209,102,.08);}
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(14px);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:620px;max-height:94vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;animation:slideUp .3s cubic-bezier(.34,1.56,.64,1);}
@media(min-width:640px){.modal{border-radius:24px;animation:popIn .25s cubic-bezier(.34,1.56,.64,1);}}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes popIn{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
.modal-drag{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:14px auto 0;display:block;}
@media(min-width:640px){.modal-drag{display:none;}}
.modal-body{padding:20px 22px 26px;}
.mtabs{display:flex;gap:3px;margin-bottom:18px;background:var(--bg3);border-radius:12px;padding:4px;}
.mtab{flex:1;padding:7px 4px;border-radius:9px;border:none;background:none;color:var(--muted2);font-family:"Instrument Sans",sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap;}
.mtab.active{background:var(--card);color:var(--text);border:1px solid var(--border);}
.mpanel{display:none;}
.mpanel.active{display:block;animation:fadeIn .2s ease;}
.mhdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:10px;}
.masset{display:flex;align-items:center;gap:12px;}
.mico{width:50px;height:50px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:24px;}
.msym{font-family:"Bricolage Grotesque",sans-serif;font-size:20px;font-weight:800;letter-spacing:-1px;}
.mname{font-size:12px;color:var(--muted2);margin-top:2px;}
.mpricebox{text-align:right;}
.mprice{font-family:"Bricolage Grotesque",sans-serif;font-size:24px;font-weight:800;}
.mchg{font-size:13px;font-weight:700;margin-top:3px;}
.mchg.up{color:var(--green);}
.mchg.dn{color:var(--red);}
.closebtn{width:32px;height:32px;border-radius:9px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;}
.closebtn:hover{border-color:var(--red);color:var(--red);}
.mstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.ms{background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:10px;}
.ms-l{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:5px;font-weight:700;}
.ms-v{font-family:"Bricolage Grotesque",sans-serif;font-size:14px;font-weight:700;}
.chart-container{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;}
.chart-periods{display:flex;gap:4px;margin-bottom:10px;}
.cp{background:none;border:none;color:var(--muted2);font-size:11px;font-weight:600;padding:4px 10px;border-radius:7px;cursor:pointer;transition:all .18s;}
.cp.active{background:rgba(0,255,136,.1);color:var(--green);}
.chart-svg-wrap{height:100px;}
.chart-svg-wrap svg{width:100%;height:100%;}
.chart-lbl{display:flex;justify-content:space-between;margin-top:6px;}
.chart-lbl span{font-size:10px;color:var(--muted);}
.sec-title{font-family:"Bricolage Grotesque",sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;}
.brokers-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.bcard{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .22s;}
.bcard:hover{border-color:var(--green);transform:translateY(-3px);}
.bico{font-size:24px;margin-bottom:5px;}
.bname{font-family:"Bricolage Grotesque",sans-serif;font-size:11px;font-weight:700;margin-bottom:2px;}
.bcta{font-size:10px;color:var(--green);font-weight:600;}
.bbonus{font-size:9px;color:var(--gold);margin-top:2px;}
.comp-table{width:100%;border-collapse:collapse;font-size:12px;}
.comp-table th{background:var(--bg3);padding:8px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:700;}
.comp-table td{padding:10px;border-bottom:1px solid var(--border);}
.comp-table tr:last-child td{border-bottom:none;}
.tag-best{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;background:rgba(0,255,136,.15);color:var(--green);margin-left:4px;}
.sim-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.sim-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.sg{display:flex;flex-direction:column;gap:5px;}
.sg label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
.sg input,.sg select{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-family:"Instrument Sans",sans-serif;font-size:14px;outline:none;transition:border-color .2s;width:100%;}
.sg input:focus,.sg select:focus{border-color:var(--green);}
.sim-result{background:linear-gradient(135deg,rgba(0,255,136,.08),rgba(77,121,255,.05));border:1px solid rgba(0,255,136,.2);border-radius:14px;padding:14px;}
.sr-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px;}
.sr-item{text-align:center;}
.sr-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
.sr-val{font-family:"Bricolage Grotesque",sans-serif;font-size:18px;font-weight:800;}
.news-list{display:flex;flex-direction:column;gap:10px;}
.ncard{background:var(--bg3);border:1px solid var(--border);border-radius:13px;padding:14px;cursor:pointer;transition:all .2s;}
.ncard:hover{border-color:var(--border2);transform:translateX(3px);}
.ntag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:rgba(0,255,136,.1);color:var(--green);display:inline-block;margin-bottom:8px;}
.ntitle{font-family:"Bricolage Grotesque",sans-serif;font-size:13px;font-weight:700;line-height:1.4;margin-bottom:6px;}
.nmeta{font-size:11px;color:var(--muted);}
.nsent.pos{color:var(--green);}
.nsent.neg{color:var(--red);}
.nsent.neu{color:var(--muted2);}
.ai-panel{background:linear-gradient(135deg,rgba(0,255,136,.05),rgba(77,121,255,.03));border:1px solid rgba(0,255,136,.15);border-radius:16px;padding:16px;}
.ai-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.ai-orb{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--green),#00aa55);display:flex;align-items:center;justify-content:center;font-size:18px;animation:orbGlow 2s ease-in-out infinite;}
@keyframes orbGlow{0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,.3);}50%{box-shadow:0 0 0 6px rgba(0,255,136,0);}}
